# Nginx configuration for Binance MCP Services
# 核心修改：增加了 sub_filter 配置

upstream mcp_market_backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

upstream mcp_account_backend {
    server 127.0.0.1:8001;
    keepalive 64;
}

server {
    listen 80;
    server_name joccboy.asia;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name joccboy.asia;
    
    # SSL 配置 (保持不变)
    ssl_certificate /etc/nginx/certs/joccboy.asia_bundle.crt;
    ssl_certificate_key /etc/nginx/certs/joccboy.asia.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    access_log /var/log/nginx/mcp_access.log;
    error_log /var/log/nginx/mcp_error.log;
    
    # 自动补全斜杠
    location = /market { return 301 /market/; }
    location = /account { return 301 /account/; }
    
    # === Market Service ===
    location /market/ {
        proxy_pass http://mcp_market_backend/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # --- 核心修复开始 ---
        # 强制替换后端返回的路径
        # 将 "/messages" 替换为 "/market/messages"
        # 这样客户端发起的 POST 请求就会带上 /market 前缀
        sub_filter '/messages' '/market/messages';
        sub_filter_types text/event-stream application/json; 
        sub_filter_once off;
        # --- 核心修复结束 ---

        # SSE 配置
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        
        proxy_request_buffering off;
        chunked_transfer_encoding on;
    }
    
    # === Account Service ===
    location /account/ {
        proxy_pass http://mcp_account_backend/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- 核心修复开始 ---
        # 将 "/messages" 替换为 "/account/messages"
        sub_filter '/messages' '/account/messages';
        sub_filter_types text/event-stream application/json;
        sub_filter_once off;
        # --- 核心修复结束 ---
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        
        proxy_request_buffering off;
        chunked_transfer_encoding on;
    }
}