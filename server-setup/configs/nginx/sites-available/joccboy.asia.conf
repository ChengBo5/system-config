# joccboy.asia - 统一 HTTPS 入口
# /market/ -> MCP Market (127.0.0.1:8000)
# /account/ -> MCP Account (127.0.0.1:8001)
# /reverse/ -> 反代服务 (127.0.0.1:8317)

upstream mcp_market_backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

upstream mcp_account_backend {
    server 127.0.0.1:8001;
    keepalive 64;
}

server {
    listen 80;
    server_name joccboy.asia;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name joccboy.asia;

    ssl_certificate     /etc/nginx/ssl/joccboy.asia/joccboy.asia_nginx/joccboy.asia_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/joccboy.asia/joccboy.asia_nginx/joccboy.asia.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/joccboy.asia_access.log;
    error_log  /var/log/nginx/joccboy.asia_error.log;

    # === 反代服务 (本地 8317 端口) ===
    location /reverse/ {
        proxy_pass http://127.0.0.1:8317/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 自动补全斜杠
    location = /market  { return 301 /market/; }
    location = /account { return 301 /account/; }

    # === Market Service ===
    location /market/ {
        proxy_pass http://mcp_market_backend/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        sub_filter '/messages' '/market/messages';
        sub_filter_types text/event-stream application/json;
        sub_filter_once off;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;

        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        proxy_request_buffering off;
        chunked_transfer_encoding on;
    }

    # === Account Service ===
    location /account/ {
        proxy_pass http://mcp_account_backend/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        sub_filter '/messages' '/account/messages';
        sub_filter_types text/event-stream application/json;
        sub_filter_once off;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;

        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        proxy_request_buffering off;
        chunked_transfer_encoding on;
    }
}
